name: Titan Framework CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, headlesschrome, firefox, headlessfirefox]

    env:
      BROWSER: ${{ matrix.browser }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Inject API Credentials to .env
        run: |
          touch .env
          echo "WC_KEY=${{ secrets.WC_KEY }}" >> .env
          echo "WC_SECRET=${{ secrets.WC_SECRET }}" >> .env

      - name: Start Infrastructure and Run Tests
        run: sudo docker compose up --abort-on-container-exit